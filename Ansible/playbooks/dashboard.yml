---
- name: Configure dashboard server Tailscale client
  hosts: dashboard
  become: true

  tasks:
    - name: Validate Tailscale settings
      ansible.builtin.assert:
        that:
          - tailscale_auth_key | length > 0
          - tailscale_hostname | length > 0

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Tailscale dependencies
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - apt-transport-https
          - ca-certificates
        state: present

    - name: Add Tailscale GPG key
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
      args:
        creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

    - name: Add Tailscale repository
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list | tee /etc/apt/sources.list.d/tailscale.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/tailscale.list

    - name: Update apt cache after adding Tailscale repo
      ansible.builtin.apt:
        update_cache: true

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present

    - name: Ensure Tailscale is enabled and running
      ansible.builtin.service:
        name: tailscaled
        state: started
        enabled: true

    - name: Bring Tailscale up with auth key and tags
      ansible.builtin.command: >-
        tailscale up
        --auth-key={{ tailscale_auth_key }}
        --hostname={{ tailscale_hostname }}
        {% if tailscale_advertise_tags | default([]) | length > 0 -%}
        --advertise-tags={{ tailscale_advertise_tags | join(',') }}
        {%- endif %}
      register: tailscale_up_result
      changed_when: tailscale_up_result.rc == 0
      no_log: true

    - name: Show Tailscale IP
      ansible.builtin.command:
        argv:
          - tailscale
          - ip
          - -4
      register: tailscale_ip
      changed_when: false

    - name: Print dashboard server Tailscale endpoint
      ansible.builtin.debug:
        msg: "Dashboard server is bereikbaar via {{ tailscale_ip.stdout }}"
